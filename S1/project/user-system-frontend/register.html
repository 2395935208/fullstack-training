<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录系统</title> 
</head>
<body>
    <header>
        <h1>欢迎来到登录界面</h1>
    </header>
    <main>
        <section>
            <h2>账号登录</h2>
            <form action="/login" method="post">
                <label for="reg-user">用户账号：</label>
                <input type="text" id="reg-user" name="username" required placeholder="请输入用户名">
                <br>
                <label for="reg-password">用户密码：</label>
                <input type="password" id="reg-password" name="password" required placeholder="请输入密码">
                <br>
                <!--添加确认密码功能-->
                <label for="reg-confirm"> 确认密码：</label>
                <input type="password" id="reg-confirm" name="confirm" required placeholder="请在此输入密码">
                <br>
                <label for="reg-email">电子邮件：</label>
                <input type="email" id="reg-email" name="email" required placeholder="请输入电子邮件">
                <br>
                <!--添加性别选项-->
                <fieldset>
                    <legend>性别：</legend>
                    <label>
                        <input type="radio" name="gender" value="male">
                        男
                    </label>
                    <label>
                        <input type="radio" name="gender" value="female">
                        女
                        </input>
                    </label>
                </fieldset>
<!--                添加爱好功能-->
                <fieldset>
                    <legend>爱好：</legend>
                    <label>
                        <input type="checkbox" name="hobby" value="reading">
                        阅读
                    </label>
                    <label>
                        <input type="checkbox" name="hobby" value="swimming"></input>
                        游泳
                    </label>
                    <label>
                        <input type="checkbox" name="hobby" value="coding">
                        编码
                    </label>
                </fieldset>
                <footer>
                    <button type="submit">登录</button>
                </footer>
            </form>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
