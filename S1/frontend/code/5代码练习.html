<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册 - 语义化实战</title>
</head>
<body>

    <header>
        <h1>新用户注册</h1>
    </header>

    <main>
        <section>
            <h2>填写注册信息</h2>

            <form action="#" method="POST">
                
                <div>
                    <label for="username">用户名：</label>
                    <input type="text" id="username" name="username" placeholder="建议使用英文数字">
                </div>

                <div>
                    <label for="password">密码：</label>
                    <input type="password" id="password" name="password" placeholder="请输入 6-16 位密码">
                </div>

                <button type="submit">立即提交注册</button>
            
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 我的练习项目. 保留所有权利。</p>
    </footer>

</body>
</html>
